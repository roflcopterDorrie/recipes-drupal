server {
    listen 80;
    server_name localhost;
    root /opt/drupal/web; 
    index index.php;

    # Maximum file upload size
    client_max_body_size 100M;

    # 1. Standard Request Entry Point
    location / {
        # Without $uri/, Nginx passes directory paths smoothly to Drupal
        try_files $uri /index.php?$query_string;
    }

    # 2. Handle actual user-uploaded files via the shared volume
    location /sites/default/files/ {
        try_files $uri @rewrite; 
    }

    # 3. Dynamic Image Styles & CSS/JS Aggregates (Consolidated)
    location ~ ^/sites/.*/files/(css|js|styles)/ {
        try_files $uri @rewrite;
    }

    # 4. FIX FOR CORE ASSETS (Themes, Core JS/CSS)
    # Catches the olivero screenshot and handles it via PHP-FPM since Nginx has no local disk copy
    location ~* ^/(core|modules|themes|profiles)/.*\.(jpg|jpeg|png|gif|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        try_files $uri @drupal_asset;
    }

    # 5. Handle PHP execution by passing it to the 'drupal' container
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass drupal:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/drupal/web$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # --- NAMED FALLBACK REWRITES ---

    # Fallback to pass static assets through Drupal's internal streamer
    location @drupal_asset {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/drupal/web/index.php;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_pass  drupal:9000;
    }

    # Standard clean URL rewrite rule
    location @rewrite {
        rewrite ^ /index.php;
    }

    # --- SECURITY BLOCKS ---

    # Deny access to private files and backups
    location ~* \.(engine|inc|install|make|module|profile|po|sh|.*sql|theme|twig|tpl\.php|xtmpl)$|^(?:\..*|composer\.(json|lock)|web\.config)$ {
        deny all;
    }

    # Deny access to the vendor directory
    location ^~ /vendor/ {
        deny all;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}